name: Update Lake County Board leadership roles

# Weekly refresh of the consolidated county-board layer's Lake leadership
# tags (data/app/lake-county-board-roles.json, fetched by index.html). The
# Lake boundary GIS carries every member's name/contact live — this tiny
# roster carries the one officeholder fact it lacks: which member chairs
# the board (Chair / Vice-Chair, elected from among the 19 members). On
# change, opens a PR rather than committing directly to main —
# officeholder data should get a human look before it ships.
#
# The county site's edge 403s datacenter clients; the scraper's built-in
# ladder falls back to the Internet Archive's newest snapshot (age-guarded
# at 45 days — the Archive crawls Lake's site regularly). No Playwright: a
# single-page, secondary enrichment doesn't warrant a browser install.

on:
  schedule:
    - cron: "0 17 * * 4" # Thursday 17:00 UTC (county-board day: Will 13, Kendall 14, McHenry 15, Kane 16)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-roles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install scraper dependencies
        run: pip install -c scripts/requirements.txt requests beautifulsoup4

      - name: Scrape Lake County Board leadership roles
        run: python3 scripts/lake_county_board_roles_scraper.py /tmp/lake_roles_raw.json

      - name: Rebuild roles data file
        run: python3 scripts/build_lake_county_board_roles.py /tmp/lake_roles_raw.json

      # Gate the regenerated data before it can reach a PR: the app must still
      # parse and carry every layer, and every data/app file must be present
      # and well formed. node is preinstalled on ubuntu-latest.
      - name: Validate app + data files
        run: python3 scripts/validate_index.py index.html

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- data/app/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fixed branch (not per-run): an unmerged roster PR is refreshed in
          # place by the force-push below instead of spawning a duplicate PR
          # every week.
          branch="bot/lake-county-board-roles-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/app/lake-county-board-roles.json
          git commit -m "Update Lake County Board leadership roles from lakecountyil.gov"
          git push -u origin "$branch" --force
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --title "Update Lake County Board leadership roles from lakecountyil.gov" \
              --body "Automated weekly refresh of the consolidated county-board layer's Lake leadership tags (Board Chair / Vice-Chair by district, with every member's name for the card's stale-role guard), generated by \`scripts/lake_county_board_roles_scraper.py\` + \`scripts/build_lake_county_board_roles.py\` from the county's own Board Members directory. Please review the diff before merging — this changes data about real officeholders." \
              --base main \
              --head "$branch"
          else
            echo "PR already open for $branch; force-push refreshed it."
          fi
