name: Update McHenry County Board roster

# Weekly refresh of the consolidated county-board layer's McHenry member
# roster (data/app/mchenry-county-board-members.json, fetched by index.html).
# Re-scrapes mchenrycountyil.gov's board-members listing + per-member pages
# (names, districts, the countywide Chairman, phones, emails) and, if
# anything changed, opens a PR rather than committing directly to main —
# officeholder data should get a human look before it ships.

on:
  schedule:
    - cron: "0 15 * * 4" # Thursday 15:00 UTC (county-board day: Will 13:00, Kendall 14:00)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install scraper dependencies
        run: pip install -r scripts/requirements.txt

      # mchenrycountyil.gov 403s plain datacenter HTTP clients (bot
      # management). The scraper's default --engine auto falls back to a
      # real headless Chromium when that happens, so Chromium must be
      # present (same pattern as update-cpd-roster.yml /
      # update-kendall-county-board-roster.yml).
      - name: Install Chromium for Playwright
        run: python3 -m playwright install --with-deps chromium

      - name: Scrape McHenry County Board member roster
        run: python3 scripts/mchenry_county_board_scraper.py /tmp/mchenry_county_board_raw.json

      - name: Rebuild roster data file
        run: python3 scripts/build_mchenry_county_board_roster.py /tmp/mchenry_county_board_raw.json

      # Gate the regenerated data before it can reach a PR: the app must still
      # parse and carry every layer, and every data/app file must be present
      # and well formed. node is preinstalled on ubuntu-latest.
      - name: Validate app + data files
        run: python3 scripts/validate_index.py index.html

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- data/app/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fixed branch (not per-run): an unmerged roster PR is refreshed in
          # place by the force-push below instead of spawning a duplicate PR
          # every week.
          branch="bot/mchenry-county-board-roster-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/app/mchenry-county-board-members.json
          git commit -m "Update McHenry County Board roster from mchenrycountyil.gov"
          git push -u origin "$branch" --force
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --title "Update McHenry County Board roster from mchenrycountyil.gov" \
              --body "Automated weekly refresh of the consolidated county-board layer's McHenry member roster (names, districts, the countywide Chairman, phones, emails), generated by \`scripts/mchenry_county_board_scraper.py\` + \`scripts/build_mchenry_county_board_roster.py\` from mchenrycountyil.gov. Please review the diff before merging — this changes data about real officeholders." \
              --base main \
              --head "$branch"
          else
            echo "PR already open for $branch; force-push refreshed it."
          fi
