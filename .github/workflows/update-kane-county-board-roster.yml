name: Update Kane County Board roster

# Weekly refresh of the consolidated county-board layer's Kane member roster
# (data/app/kane-county-board-members.json, fetched by index.html). Re-reads
# the county's own SharePoint "Board Members" list API (the same data the
# boardMembers.aspx directory renders client-side: names, districts, party,
# the official office lines, emails, and the countywide-elected Board Chair)
# and, if anything changed, opens a PR rather than committing directly to
# main — officeholder data should get a human look before it ships.
#
# Unlike the Kendall/McHenry sites, Kane's does not bot-block automated
# clients (verified 2026-07-23), so this is a plain requests job — no
# Playwright, and a failure is RED (the normal roster pattern), not a
# standing-issue state.

on:
  schedule:
    - cron: "0 16 * * 4" # Thursday 16:00 UTC (county-board day: Will 13:00, Kendall 14:00, McHenry 15:00)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install scraper dependencies
        run: pip install -c scripts/requirements.txt requests

      - name: Scrape Kane County Board member roster
        run: python3 scripts/kane_county_board_scraper.py /tmp/kane_county_board_raw.json

      - name: Rebuild roster data file
        run: python3 scripts/build_kane_county_board_roster.py /tmp/kane_county_board_raw.json

      # Gate the regenerated data before it can reach a PR: the app must still
      # parse and carry every layer, and every data/app file must be present
      # and well formed. node is preinstalled on ubuntu-latest.
      - name: Validate app + data files
        run: python3 scripts/validate_index.py index.html

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- data/app/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fixed branch (not per-run): an unmerged roster PR is refreshed in
          # place by the force-push below instead of spawning a duplicate PR
          # every week.
          branch="bot/kane-county-board-roster-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/app/kane-county-board-members.json
          git commit -m "Update Kane County Board roster from kanecountyil.gov"
          git push -u origin "$branch" --force
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --title "Update Kane County Board roster from kanecountyil.gov" \
              --body "Automated weekly refresh of the consolidated county-board layer's Kane member roster (names, districts, party, office phones, emails, and the countywide-elected Board Chair), generated by \`scripts/kane_county_board_scraper.py\` + \`scripts/build_kane_county_board_roster.py\` from the county's own SharePoint Board Members list. Please review the diff before merging — this changes data about real officeholders." \
              --base main \
              --head "$branch"
          else
            echo "PR already open for $branch; force-push refreshed it."
          fi
